kind = "web"
previewPath = "/"
title = "Research & Discovery"
version = "1.0.0"
id = "artifacts/research-discovery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20099

[services.development]
run = "pnpm --filter @workspace/research-discovery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/research-discovery", "run", "build" ]
publicDir = "artifacts/research-discovery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20099"
BASE_PATH = "/"
